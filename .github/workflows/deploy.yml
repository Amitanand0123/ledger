name: CD

# Deployment is handled automatically by the hosting platforms:
# - Frontend: Vercel auto-deploys on push to main
# - Backend: Render auto-deploys on push to main
# - AI Service: Render auto-deploys on push to main
#
# This workflow exists only to block deploys when CI fails.
# Connect Render/Vercel to only deploy after CI passes by setting:
# - Vercel: Settings → Git → Checks (require passing checks)
# - Render: Auto-Deploy is branch-based (CI gate is advisory)

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed
    branches:
      - main

jobs:
  ci-status:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Report CI status
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "CI passed — platforms will auto-deploy"
          else
            echo "CI failed — check: ${{ github.event.workflow_run.html_url }}"
            exit 1
          fi
