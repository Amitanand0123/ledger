openapi: 3.0.0
info:
  title: Ledger API
  description: Job application tracker API - Track and manage your job applications with AI-powered insights
  version: 1.0.0
  contact:
    name: API Support
    email: support@ledger.com

servers:
  - url: http://localhost:5000/api/v1
    description: Development server
  - url: https://api.ledger.com/api/v1
    description: Production server

tags:
  - name: Health
    description: Health check endpoints
  - name: Authentication
    description: User authentication and authorization
  - name: Jobs
    description: Job application management
  - name: Documents
    description: Resume and cover letter management
  - name: Notes
    description: Job notes management
  - name: Interviews
    description: Interview scheduling and management
  - name: Platforms
    description: Job platforms (LinkedIn, Indeed, etc.)
  - name: Custom Fields
    description: User-defined fields for job applications
  - name: Sharing
    description: Dashboard sharing between users
  - name: Users
    description: User profile and settings
  - name: AI
    description: AI-powered job analysis and recommendations
  - name: Agent
    description: AI agent for resume optimization

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: object

    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

    JobApplication:
      type: object
      properties:
        id:
          type: string
        company:
          type: string
        position:
          type: string
        location:
          type: string
        salary:
          type: string
        url:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [INTERESTED, PREPARING, READY_TO_APPLY, APPLIED, OA, INTERVIEW, OFFER, ACCEPTED, REJECTED, WITHDRAWN]
        applicationDate:
          type: string
          format: date-time
        deadline:
          type: string
          format: date-time
        platformId:
          type: string
        resumeId:
          type: string
        coverLetterId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

paths:
  /health:
    get:
      tags:
        - Health
      summary: Basic health check
      description: Returns server status and uptime
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                  timestamp:
                    type: string
                  uptime:
                    type: number

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Checks if all dependencies (database, etc.) are ready
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is not ready

  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Validation error
        '409':
          description: User already exists

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      refreshToken:
                        type: string
                      user:
                        type: object
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
        '401':
          description: Invalid refresh token

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User data retrieved
        '401':
          description: Unauthorized

  /jobs:
    get:
      tags:
        - Jobs
      summary: Get all job applications
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Jobs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JobApplication'
                  pagination:
                    type: object
    post:
      tags:
        - Jobs
      summary: Create new job application
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobApplication'
      responses:
        '201':
          description: Job created successfully
        '400':
          description: Validation error

  /jobs/{id}:
    get:
      tags:
        - Jobs
      summary: Get job application by ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job retrieved successfully
        '404':
          description: Job not found
    put:
      tags:
        - Jobs
      summary: Update job application
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobApplication'
      responses:
        '200':
          description: Job updated successfully
        '404':
          description: Job not found
    delete:
      tags:
        - Jobs
      summary: Delete job application
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job deleted successfully
        '404':
          description: Job not found

  /jobs/{id}/match-analysis:
    post:
      tags:
        - Jobs
      summary: Analyze resume match for job
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resumeId
              properties:
                resumeId:
                  type: string
      responses:
        '200':
          description: Analysis completed
        '404':
          description: Job or resume not found

  /documents:
    get:
      tags:
        - Documents
      summary: Get all documents
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [RESUME, COVER_LETTER]
      responses:
        '200':
          description: Documents retrieved successfully
    post:
      tags:
        - Documents
      summary: Create document
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filename
                - fileKey
                - type
              properties:
                filename:
                  type: string
                fileKey:
                  type: string
                type:
                  type: string
                  enum: [RESUME, COVER_LETTER]
      responses:
        '201':
          description: Document created successfully

  /platforms:
    get:
      tags:
        - Platforms
      summary: Get all job platforms
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: Platforms retrieved successfully

  /custom-fields:
    get:
      tags:
        - Custom Fields
      summary: Get all custom fields
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Custom fields retrieved
    post:
      tags:
        - Custom Fields
      summary: Create custom field
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [TEXT, NUMBER, DATE, BOOLEAN]
      responses:
        '201':
          description: Custom field created

  /shares:
    get:
      tags:
        - Sharing
      summary: Get shared users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Shared users retrieved
    post:
      tags:
        - Sharing
      summary: Share dashboard with user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: Dashboard shared successfully

  /users/stats:
    get:
      tags:
        - Users
      summary: Get user statistics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Stats retrieved successfully

  /ai/job-analysis/{jobId}:
    get:
      tags:
        - AI
      summary: Analyze job description with AI
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Analysis completed
        '429':
          description: Rate limit exceeded

  /agent/invoke:
    post:
      tags:
        - Agent
      summary: Invoke AI agent for resume recommendations
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resumeId
                - jobId
                - userGoal
              properties:
                resumeId:
                  type: string
                jobId:
                  type: string
                userGoal:
                  type: string
      responses:
        '200':
          description: Recommendations generated

  /agent/rebuild-resume:
    post:
      tags:
        - Agent
      summary: Rebuild resume for specific job
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resumeId
                - jobId
              properties:
                resumeId:
                  type: string
                jobId:
                  type: string
      responses:
        '200':
          description: Resume rebuilt successfully
