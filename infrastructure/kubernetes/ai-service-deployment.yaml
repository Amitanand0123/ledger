apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: job-tracker
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: job-tracker-ai:latest
        imagePullPolicy: Never
        env:
        - name: PINECONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-service-secret
              key: pinecone-api-key
        - name: PINECONE_INDEX_NAME
          value: "ledger"
        - name: AI_SERVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-service-secret
              key: ai-service-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-service-secret
              key: gemini-api-key
              optional: true
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: job-tracker
  labels:
    app: ai-service
spec:
  selector:
    app: ai-service
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  type: ClusterIP
