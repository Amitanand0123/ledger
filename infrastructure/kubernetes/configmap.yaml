# ConfigMap for non-sensitive application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: job-tracker
data:
  # Backend configuration
  NODE_ENV: "production"
  PORT: "5000"

  # Database configuration
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5433"
  DATABASE_NAME: "jobtracker"
  DATABASE_USER: "user"

  # AWS configuration
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "job-tracker-uploads"

  # Frontend URLs
  FRONTEND_URL: "http://jobtracker.local"
  NEXT_PUBLIC_API_URL: "http://jobtracker.local/api/v1"
  NEXTAUTH_URL: "http://jobtracker.local"

  # AI Service configuration
  AI_SERVICE_URL: "http://ai-service:8000"

  # Email configuration (optional)
  RESEND_API_KEY: ""  # Leave empty if not using email service

  # Feature flags
  ENABLE_GOOGLE_OAUTH: "false"  # Set to "true" if using Google OAuth
  ENABLE_S3_UPLOADS: "false"    # Set to "true" if using S3
  ENABLE_AI_FEATURES: "true"    # AI features enabled by default

---
# Frontend-specific ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: job-tracker
data:
  NEXT_PUBLIC_APP_NAME: "Job Tracker"
  NEXT_PUBLIC_APP_VERSION: "1.0.0"
