# This is the BASE file for all environments.
services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ../backend/.env
    environment:
      NODE_ENV: production
      # Override localhost URLs with Docker network hostnames
      DATABASE_URL: postgresql://postgres:password@postgres:5432/ledger
      AI_SERVICE_URL: http://ai-service:8000
      CLIENT_URL: http://localhost:3021
    ports:
      - "5100:5000"
    depends_on:
      - postgres
      - ai-service
    networks:
      - app-network

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        # Baked into client-side JS — browser calls backend via host port
        NEXT_PUBLIC_API_URL: http://localhost:5100
    env_file:
      - ../frontend/.env
    environment:
      HOSTNAME: 0.0.0.0
      # Server-side API calls use Docker internal networking
      INTERNAL_API_URL: http://backend:5000
      NEXTAUTH_URL: http://localhost:3021
    ports:
      - "3021:3021"
    depends_on:
      - backend
    networks:
      - app-network

  ai-service:
    build:
      context: ..
      dockerfile: ai-service/Dockerfile
    env_file:
      - ../ai-service/.env
    ports:
      - "8000:8000"
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ledger
    ports:
      - "5400:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
